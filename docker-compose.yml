version: "3.9"

services:

  neo4j:
    image: neo4j:5.15.0
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/lineage_password
    volumes:
      - neo4j_data:/data
    healthcheck:
      # wget on port 7474 (Neo4j HTTP browser) — returns 200 only when Neo4j is
      # fully initialized and ready to serve Bolt queries.
      # Using wget because it's built into the neo4j:5.15.0 image.
      # cypher-shell was crashing the container (exit 1 when neo4j already running).
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  postgres:
    image: postgres:15.6
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lineage_user
      POSTGRES_PASSWORD: lineage_password
      POSTGRES_DB: lineage_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lineage_user -d lineage_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow:
    image: apache/airflow:2.8.1-python3.10
    tty: true
    stdin_open: true
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-openlineage
      - OPENLINEAGE_URL=http://host.docker.internal:8000
      - OPENLINEAGE_NAMESPACE=airflow_demo
    volumes:
      - ./airflow_dags:/opt/airflow/dags
      - airflow_data:/opt/airflow
    command: standalone

volumes:
  neo4j_data:
  postgres_data:
  airflow_data: